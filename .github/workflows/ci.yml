name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel previous runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # Tests that import src/lib/env.ts (e.g. env.test.ts) need the same
      # env vars as the build, because env.ts runs createEnv() at module
      # load. Mirroring the build's dummies keeps the test path matching
      # what Vercel does — no SKIP_ENV_VALIDATION shortcut.
      - name: Test
        run: npm test
        env:
          DATABASE_URL: postgres://placeholder@localhost:5432/aucket
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_BzfCk3uvy7Wxam6Ym7Vmpl6Ic37cuhFsZ4kc8Lz9G5

      # Build needs all required env vars to satisfy src/lib/env.ts. Real
      # secrets stay in Vercel; CI uses format-valid dummies + the global
      # SKIP_ENV_VALIDATION escape hatch is intentionally NOT used here so
      # this build path matches what Vercel actually does.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgres://placeholder@localhost:5432/aucket
          NEXT_PUBLIC_APP_URL: http://localhost:3001
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_BzfCk3uvy7Wxam6Ym7Vmpl6Ic37cuhFsZ4kc8Lz9G5

  integration:
    name: integration tests (real postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Side-car Postgres container, same major version as Supabase prod
    # (Postgres 17). Matches the local-Docker setup in
    # docs/runbooks/local-dev.md so a green run here means a green run
    # locally for any developer with Docker installed.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: auckets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Integration tests
        run: npm run test:integration
        env:
          # CI's "postgres" service maps to localhost:5432; the integration
          # global-setup will refuse anything that isn't a local hostname.
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/auckets_test
