<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .badge { display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:0.02em;}
  .badge .dot { width:6px;height:6px;border-radius:999px;}
  .tag { display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:4px;font-family:var(--font-mono);font-size:11px;background:var(--ink-100);color:var(--ink-700);}
</style></head>
<body>
<div class="card">
  <div class="col gap-3">
    <span class="eyebrow">Badges &amp; Tags</span>
    <div class="row gap-2" style="flex-wrap:wrap;">
      <span class="badge" style="background:#EEF3EE;color:#163823;"><span class="dot" style="background:#1F4A2E;"></span>Placed · Row AA · 7–10</span>
      <span class="badge" style="background:#F6E6CC;color:#8F6A2A;"><span class="dot" style="background:#C99A4B;"></span>Preview</span>
      <span class="badge" style="background:#E8E6DE;color:#46443B;"><span class="dot" style="background:#6B6759;"></span>Skipped</span>
      <span class="badge" style="background:#F2D9D3;color:#722417;"><span class="dot" style="background:#A93C2A;"></span>Unplaced</span>
      <span class="badge" style="background:#0E0F0C;color:#F4F1E8;">Binding in 23h</span>
    </div>
    <div class="row gap-2" style="flex-wrap:wrap;">
      <span class="tag">tier=premium</span>
      <span class="tag">rank_key=42004</span>
      <span class="tag">offer_8f3a</span>
      <span class="tag">group=4</span>
      <span class="tag" style="background:#D5E2D5;color:#163823;">PLACED</span>
    </div>
  </div>
</div>
</body></html>
