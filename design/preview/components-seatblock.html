<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card warm" style="padding:28px;">
  <div class="col gap-3">
    <div class="row" style="justify-content:space-between;align-items:baseline;">
      <span class="eyebrow">Seat block — custom token</span>
      <span class="label-meta">14-seat row · CENTER lean</span>
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);letter-spacing:0.04em;">ROW AA · Orchestra</div>
    <!-- Row of 14 seats. Mid 6 = group A (Greenwood), next 4 each side = group B (marquee) and held -->
    <div class="row gap-1" style="background:#FFFFFF;padding:14px;border-radius:8px;border:1px solid var(--border);">
      <div style="flex:1;height:34px;border-radius:6px;background:#E8E6DE;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#46443B;">H</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">3</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">5</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">7</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#D5E2D5;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#163823;">9</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#D5E2D5;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#163823;">11</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#1F4A2E;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#F4F1E8;font-weight:600;">13</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#1F4A2E;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#F4F1E8;font-weight:600;">15</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#D5E2D5;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#163823;">17</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#D5E2D5;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#163823;">19</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">21</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">23</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F6E6CC;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:#8F6A2A;">25</div>
      <div style="flex:1;height:34px;border-radius:6px;background:#F4F1E8;border:1px dashed var(--border-strong);"></div>
    </div>
    <div class="row gap-4" style="font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);">
      <span><span style="display:inline-block;width:10px;height:10px;background:#1F4A2E;border-radius:2px;vertical-align:-1px;"></span> Your group</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#D5E2D5;border-radius:2px;vertical-align:-1px;"></span> Other placed</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#F6E6CC;border-radius:2px;vertical-align:-1px;"></span> Lower rank</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#E8E6DE;border-radius:2px;vertical-align:-1px;"></span> Hold</span>
      <span><span style="display:inline-block;width:10px;height:10px;background:#F4F1E8;border:1px dashed var(--border-strong);border-radius:2px;vertical-align:-1px;"></span> Orphan</span>
    </div>
  </div>
</div>
</body></html>
