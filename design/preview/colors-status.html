<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col gap-3">
    <div class="eyebrow">Allocation status — semantic tokens</div>
    <div class="row gap-3" style="flex-wrap:wrap;">
      <div class="col gap-1" style="flex:1;min-width:140px;">
        <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#EEF3EE;color:#1F4A2E;font-family:var(--font-sans);font-size:12px;font-weight:600;align-self:flex-start;">
          <span style="width:6px;height:6px;border-radius:999px;background:#1F4A2E;"></span> Placed
        </div>
        <div class="label-meta">--status-placed · Greenwood 600 on 50.</div>
      </div>
      <div class="col gap-1" style="flex:1;min-width:140px;">
        <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#F6E6CC;color:#8F6A2A;font-family:var(--font-sans);font-size:12px;font-weight:600;align-self:flex-start;">
          <span style="width:6px;height:6px;border-radius:999px;background:#C99A4B;"></span> Pending
        </div>
        <div class="label-meta">--status-pending · Marquee 700 on 100.</div>
      </div>
      <div class="col gap-1" style="flex:1;min-width:140px;">
        <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#E8E6DE;color:#46443B;font-family:var(--font-sans);font-size:12px;font-weight:600;align-self:flex-start;">
          <span style="width:6px;height:6px;border-radius:999px;background:#6B6759;"></span> Skipped
        </div>
        <div class="label-meta">--status-skipped · Ink 500 on 100.</div>
      </div>
      <div class="col gap-1" style="flex:1;min-width:140px;">
        <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:#F2D9D3;color:#A93C2A;font-family:var(--font-sans);font-size:12px;font-weight:600;align-self:flex-start;">
          <span style="width:6px;height:6px;border-radius:999px;background:#A93C2A;"></span> Unplaced
        </div>
        <div class="label-meta">--status-unplaced · Brick 500 on 100.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
