<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col gap-3">
    <div class="eyebrow">Surfaces</div>
    <div class="row gap-3">
      <div style="flex:1;" class="col gap-2">
        <div class="swatch lg" style="background:#FFFFFF;border:1px solid #C8C4B7;"></div>
        <div class="label-name">Page — #FFFFFF</div>
        <div class="label-meta">--page · Primary card &amp; app surface.</div>
      </div>
      <div style="flex:1;" class="col gap-2">
        <div class="swatch lg" style="background:#F4F1E8;"></div>
        <div class="label-name">Paper — #F4F1E8</div>
        <div class="label-meta">--paper · App background. Warm.</div>
      </div>
      <div style="flex:1;" class="col gap-2">
        <div class="swatch lg" style="background:#ECE7D9;"></div>
        <div class="label-name">Paper-2 — #ECE7D9</div>
        <div class="label-meta">--paper-2 · Sunken sections.</div>
      </div>
      <div style="flex:1;" class="col gap-2">
        <div class="swatch lg" style="background:#0E0F0C;"></div>
        <div class="label-name" style="color:var(--fg);">Inverse — #0E0F0C</div>
        <div class="label-meta">--bg-inverse · Footer, dialogs.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
