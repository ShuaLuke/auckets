<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="col gap-4">
    <div class="row gap-5">
      <div class="col gap-2" style="flex:1;">
        <div class="eyebrow">Marquee — secondary accent</div>
        <div class="row gap-2">
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#8F6A2A;"></div><div class="label-name">700</div></div>
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#C99A4B;"></div><div class="label-name">500</div></div>
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#E5BC79;"></div><div class="label-name">300</div></div>
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#F6E6CC;"></div><div class="label-name">100</div></div>
        </div>
        <div class="label-meta">Stage-light amber. Used sparingly for highlights, marquee CTAs, "pending" status.</div>
      </div>
      <div class="col gap-2" style="flex:1;">
        <div class="eyebrow">Brick — alert / unplaced</div>
        <div class="row gap-2">
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#722417;"></div><div class="label-name">700</div></div>
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#A93C2A;"></div><div class="label-name">500</div></div>
          <div style="flex:1" class="col gap-1"><div class="swatch" style="background:#F2D9D3;"></div><div class="label-name">100</div></div>
        </div>
        <div class="label-meta">Reserved for "skipped" and "unplaced" outcomes. Never used decoratively.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
