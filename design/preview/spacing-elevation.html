<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card warm" style="padding:32px 28px;">
  <div class="col gap-4">
    <span class="eyebrow">Elevation — used sparingly</span>
    <div class="row gap-4">
      <div class="col gap-2" style="flex:1;align-items:flex-start;">
        <div style="width:130px;height:80px;background:#FFFFFF;border-radius:8px;box-shadow:0 0 0 1px rgba(14,15,12,0.12);"></div>
        <div class="label-name">flat</div>
        <div class="label-meta">Default card.</div>
      </div>
      <div class="col gap-2" style="flex:1;align-items:flex-start;">
        <div style="width:130px;height:80px;background:#FFFFFF;border-radius:8px;box-shadow:0 1px 2px rgba(14,15,12,0.04), 0 0 0 1px rgba(14,15,12,0.12);"></div>
        <div class="label-name">sm</div>
        <div class="label-meta">Subtle lift.</div>
      </div>
      <div class="col gap-2" style="flex:1;align-items:flex-start;">
        <div style="width:130px;height:80px;background:#FFFFFF;border-radius:8px;box-shadow:0 4px 12px rgba(14,15,12,0.06), 0 0 0 1px rgba(14,15,12,0.12);"></div>
        <div class="label-name">md</div>
        <div class="label-meta">Popovers, menus.</div>
      </div>
      <div class="col gap-2" style="flex:1;align-items:flex-start;">
        <div style="width:130px;height:80px;background:#FFFFFF;border-radius:8px;box-shadow:0 16px 32px rgba(14,15,12,0.10), 0 0 0 1px rgba(14,15,12,0.12);"></div>
        <div class="label-name">lg</div>
        <div class="label-meta">Dialogs.</div>
      </div>
      <div class="col gap-2" style="flex:1;align-items:flex-start;">
        <div style="width:130px;height:80px;background:#F4F1E8;border-radius:0;box-shadow:0 0 0 1px #0E0F0C, 4px 4px 0 0 #0E0F0C;"></div>
        <div class="label-name">marquee</div>
        <div class="label-meta">Poster-style hero accent.</div>
      </div>
    </div>
  </div>
</div>
</body></html>
