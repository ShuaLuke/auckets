<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card warm" style="padding:24px;">
  <div class="row gap-3">
    <!-- Default card -->
    <div style="flex:1;background:#FFFFFF;border:1px solid rgba(14,15,12,.12);border-radius:8px;padding:16px;">
      <div class="eyebrow" style="margin-bottom:8px;">Show</div>
      <div style="font-family:var(--font-display);font-weight:600;font-size:20px;line-height:1.15;letter-spacing:-0.02em;">Lincoln Theatre</div>
      <div class="meta" style="font-size:13px;margin-top:2px;">Sat · May 25 · 8pm</div>
      <div style="display:inline-flex;margin-top:12px;padding:4px 10px;border-radius:999px;background:#F6E6CC;color:#8F6A2A;font-family:var(--font-sans);font-size:11px;font-weight:600;">Offers open</div>
    </div>
    <!-- Ticket-stub card -->
    <div style="flex:1.1;position:relative;background:#FFFFFF;border:1px solid #0E0F0C;border-radius:8px;padding:16px 20px;">
      <div style="position:absolute;left:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#F4F1E8;border:1px solid #0E0F0C;border-radius:999px;"></div>
      <div style="position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#F4F1E8;border:1px solid #0E0F0C;border-radius:999px;"></div>
      <div class="eyebrow">Your offer</div>
      <div class="row" style="align-items:baseline;gap:10px;margin-top:6px;">
        <span style="font-family:var(--font-mono);font-size:26px;font-variant-numeric:tabular-nums;letter-spacing:-0.01em;">$42.00</span>
        <span class="meta" style="font-size:13px;">× 4 tickets</span>
      </div>
      <div class="meta" style="font-size:12px;margin-top:6px;border-top:1px dashed rgba(14,15,12,.22);padding-top:8px;">Preview: Orchestra · Row AA · seats 7–10</div>
    </div>
    <!-- Inverse card -->
    <div style="flex:1;background:#0E0F0C;color:#F4F1E8;border-radius:8px;padding:16px;">
      <div class="eyebrow" style="color:#9C9789;margin-bottom:8px;">Allocation log</div>
      <div style="font-family:var(--font-mono);font-size:11px;line-height:1.6;color:#C8C4B7;">
        <div><span style="color:#6A8F6F;">PLACED</span> · offer_8f3a</div>
        <div><span style="color:#E5BC79;">FIT_RESOLVED</span> · offer_b021</div>
        <div><span style="color:#6B6759;">SKIPPED</span> · offer_c419</div>
      </div>
    </div>
  </div>
</div>
</body></html>
