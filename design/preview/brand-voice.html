<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card warm" style="padding:28px;">
  <div class="col gap-4">
    <span class="eyebrow">Voice</span>
    <div style="font-family:var(--font-display);font-weight:600;font-size:30px;line-height:1.1;letter-spacing:-0.025em;font-variation-settings:'opsz' 32;">
      Not an auction.<br>
      <span style="color:var(--fg-muted);">A fairer way to seat a room.</span>
    </div>
    <div class="row gap-4" style="border-top:1px solid var(--border-faint);padding-top:16px;">
      <div class="col gap-1" style="flex:1;">
        <div class="label-meta">DO</div>
        <div class="body-sm">Matter-of-fact. Plain English. Say what it is.</div>
      </div>
      <div class="col gap-1" style="flex:1;">
        <div class="label-meta">DON'T</div>
        <div class="body-sm" style="color:var(--fg-muted);">FOMO copy. Countdown timers. "Hurry!"</div>
      </div>
    </div>
  </div>
</div>
</body></html>
